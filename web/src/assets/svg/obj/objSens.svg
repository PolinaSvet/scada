<svg width="100" height="60" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60">
  <defs>
    <style>
      text {
        font-family: 'Courier New', monospace;
      }
    </style>
  </defs>
  
  <g id="mainGroup" transform="translate(0, 0)">
    <rect
      id="objBody"
      x="35" y="15" 
      width="30" height="30" 
      fill="#d0d0d0"      
      stroke="#000000"    
      stroke-width="2"
      rx="3"
    />
    
    <g id="objGraph">
      <polyline 
        points="15,5 10,15 20,15 15,25"
        fill="none"
        stroke="#000000"
        stroke-width="2" 
        transform="translate(35,15)"
      />
    </g>
    
    <text 
      id="objId"
      x="50" y="10" 
      dominant-baseline="auto"
      text-anchor="middle"
      fill="#000000"
      font-size="12"
      font-weight="bold"
    >
      XXX
    </text>
    
    <text 
      id="objInputValue"
      x="50" y="50" 
      dominant-baseline="hanging"
      text-anchor="middle"
      fill="#000000"
      font-size="12"
      font-weight="normal"
    >
      YYY
    </text>
    
    <g id="objImit" transform="translate(65,45)"> 
      <circle
        r="7" cx="0" cy="0"
        fill="#FF00FF" 
        stroke="#000" 
        stroke-width="1"
      />
      <text 
        x="0" y="0" 
        dominant-baseline="middle"
        text-anchor="middle"
        fill="#000000"
        font-size="12"
        font-weight="bold"
      >
        и
      </text>
    </g>
  </g>
</svg>